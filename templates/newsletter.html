<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{subject}}</title>
</head>
<body style="margin:0;padding:0;background:#F9F9F6;font-family:Georgia,serif;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#F9F9F6;">
  <tr>
    <td align="center" style="padding:32px 16px;">

      <!-- Shell -->
      <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;background:#FFFFFF;border-top:4px solid #5A6A1E;">

        <!-- Header -->
        <tr>
          <td style="padding:28px 40px 20px;border-bottom:1px solid #E8EAD8;">
            <p style="margin:0;font-family:Georgia,serif;font-size:22px;font-weight:bold;color:#1C2110;letter-spacing:-0.5px;">
              Olive Tree Investments
            </p>
            <p style="margin:4px 0 0;font-family:Arial,sans-serif;font-size:12px;color:#7A8A3A;letter-spacing:1px;text-transform:uppercase;">
              Multifamily Real Estate Intelligence
            </p>
          </td>
        </tr>

        <!-- Greeting -->
        <tr>
          <td style="padding:28px 40px 0;font-family:Georgia,serif;font-size:15px;color:#1C2110;line-height:1.6;">
            <p style="margin:0 0 20px;">Hey {{first_name}},</p>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:0 40px 32px;font-family:Georgia,serif;font-size:15px;color:#1C2110;line-height:1.7;">
            {{body_html}}
          </td>
        </tr>

        <!-- Divider -->
        <tr>
          <td style="padding:0 40px;">
            <hr style="border:none;border-top:1px solid #E8EAD8;margin:0;">
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding:24px 40px 32px;font-family:Arial,sans-serif;font-size:12px;color:#8A9060;line-height:1.6;">
            <p style="margin:0 0 6px;">
              <strong style="color:#1C2110;">Olive Tree Investments</strong> — Faith-based multifamily investing in the Southeast.
            </p>
            <p style="margin:0;">{{unsubscribe_note}}</p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>

</body>
</html>
